name: ensure_gmail_categories
runtime: python3_10
description: Ensures Gmail labels exist for custom categories (name:value).
interface:
  inputs:
    properties:
      GMAIL_API_KEY:
        type: env
        description: OAuth token for Gmail API.
      customCategories:
        type: array
      lang:
        type: string
        default: en
    required:
      - customCategories
  outputs:
    properties:
      created:
        type: array
        items:
          type: string
      existing:
        type: array
        items:
          type: string
